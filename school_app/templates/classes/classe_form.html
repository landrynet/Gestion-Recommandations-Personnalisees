{% extends 'base.html' %}
{% block title %}{{ titre }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ titre }}</h1>
  <a href="{% url 'classe_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Retour</a>
</div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Nom de la classe *</label>
        {{ form.nom }}
        <div class="form-text">Ex: 7ème, 8ème, 1ère, 2ème, etc.</div>
      </div>
      <div class="mb-3">
        <label class="form-label">Section *</label>
        {{ form.section }}
      </div>
      <div class="mb-4">
        <label class="form-label">Année scolaire *</label>
        {{ form.annee_scolaire }}
      </div>
      <button type="submit" class="btn btn-primary me-2"><i class="bi bi-save me-1"></i>Enregistrer</button>
      <a href="{% url 'classe_list' %}" class="btn btn-outline-secondary">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
