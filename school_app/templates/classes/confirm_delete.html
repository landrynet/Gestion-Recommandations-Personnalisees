{% extends 'base.html' %}
{% block content %}
<div class="page-header"><h1 class="page-title text-danger">Supprimer</h1></div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <p>Êtes-vous sûr de vouloir supprimer la <strong>{{ type }}</strong> : <strong>{{ obj }}</strong> ?</p>
    <p class="text-danger small"><i class="bi bi-exclamation-triangle me-1"></i>Cette action est irréversible.</p>
    <form method="post">{% csrf_token %}
      <button type="submit" class="btn btn-danger me-2">Supprimer</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
