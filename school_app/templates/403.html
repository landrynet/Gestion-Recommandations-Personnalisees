<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accès refusé — SGN</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background: #f3f4f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .error-card { max-width: 480px; text-align: center; }
    .error-code { font-size: 6rem; font-weight: 800; color: #dee2e6; line-height: 1; }
  </style>
</head>
<body>
  <div class="error-card p-4">
    <div class="error-code">403</div>
    <i class="bi bi-shield-lock-fill text-warning" style="font-size:3rem"></i>
    <h1 class="h3 mt-3 mb-2">Accès refusé</h1>
    <p class="text-muted mb-4">
      Vous n'avez pas les permissions nécessaires pour accéder à cette page.
    </p>
    <a href="/dashboard/" class="btn btn-primary me-2">
      <i class="bi bi-house-fill me-1"></i>Tableau de bord
    </a>
    <a href="javascript:history.back()" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Retour
    </a>
  </div>
</body>
</html>
