{% extends 'base.html' %}
{% block content %}
<div class="page-header"><h1 class="page-title text-danger">Supprimer l'utilisateur</h1></div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <p>Supprimer l'utilisateur <strong>{{ obj.username }}</strong> ({{ obj.get_full_name }}) ?</p>
    <form method="post">{% csrf_token %}
      <button type="submit" class="btn btn-danger me-2">Supprimer</button>
      <a href="{% url 'user_list' %}" class="btn btn-outline-secondary">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
