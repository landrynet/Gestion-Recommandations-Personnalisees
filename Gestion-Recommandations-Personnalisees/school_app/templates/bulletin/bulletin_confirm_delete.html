{% extends 'base.html' %}
{% block content %}
<div class="page-header"><h1 class="page-title text-danger">Supprimer le modèle</h1></div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <p>Supprimer le modèle de bulletin : <strong>{{ obj }}</strong> ?</p>
    <form method="post">{% csrf_token %}
      <button type="submit" class="btn btn-danger me-2">Supprimer</button>
      <a href="{% url 'bulletin_list' %}" class="btn btn-outline-secondary">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
