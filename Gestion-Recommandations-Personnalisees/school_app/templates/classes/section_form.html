{% extends 'base.html' %}
{% block title %}{{ titre }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ titre }}</h1>
  <a href="{% url 'section_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Retour</a>
</div>
<div class="card" style="max-width:400px">
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Nom de la section *</label>
        {{ form.nom }}
      </div>
      <button type="submit" class="btn btn-primary me-2"><i class="bi bi-save me-1"></i>Enregistrer</button>
      <a href="{% url 'section_list' %}" class="btn btn-outline-secondary">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
