{% extends 'base.html' %}
{% block content %}
<div class="page-header"><h1 class="page-title text-danger">Supprimer l'élève</h1></div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <p>Êtes-vous sûr de vouloir supprimer l'élève <strong>{{ obj.nom_complet }}</strong> ({{ obj.matricule }}) ?</p>
    <p class="text-danger small"><i class="bi bi-exclamation-triangle me-1"></i>Cette action est irréversible.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger me-2">Supprimer</button>
      <a href="{% url 'student_list' %}" class="btn btn-outline-secondary">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
